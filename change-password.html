<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Change Password — Visitors Parking</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

<!-- Header -->
<header class="app-header">
  <div class="header-inner">
    <a class="header-logo" href="index.html">
      <span class="logo-icon">🅿️</span>
      <div class="logo-text">
        <span class="logo-name">Visitors Parking</span>
        <span class="logo-sub">Staff Portal</span>
      </div>
    </a>
    <nav class="header-nav desktop-nav">
      <a href="enforcement.html" class="nav-link">Enforcement</a>
      <a href="exemptions.html"  class="nav-link">Exemptions</a>
      <a href="register.html"    class="nav-link" target="_blank">Resident Portal ↗</a>
    </nav>
    <div class="header-right">
      <span class="user-badge desktop-only" id="user-badge"></span>
      <button class="btn btn-outline btn-sm" id="logout-btn">Sign Out</button>
    </div>
  </div>
</header>

<!-- Page Content -->
<div class="portal-page" style="max-width:480px;margin:40px auto">

  <div class="login-card" style="box-shadow:var(--shadow);border-radius:var(--radius);padding:32px">
    <h2 style="margin-bottom:4px">Change Password</h2>
    <p style="color:var(--muted);font-size:.9rem;margin-bottom:24px">
      Choose a new password for your account.
    </p>

    <div class="alert alert-error hidden"   id="form-error"></div>
    <div class="alert alert-success hidden" id="form-success"></div>

    <form id="cp-form" novalidate>
      <div class="form-group">
        <label for="current_password">Current Password</label>
        <input id="current_password" type="password" class="form-control"
          required autocomplete="current-password" />
      </div>
      <div class="form-group">
        <label for="new_password">New Password</label>
        <input id="new_password" type="password" class="form-control"
          required autocomplete="new-password" />
        <small class="field-hint">Minimum 6 characters.</small>
      </div>
      <div class="form-group">
        <label for="confirm_password">Confirm New Password</label>
        <input id="confirm_password" type="password" class="form-control"
          required autocomplete="new-password" />
      </div>
      <button type="submit" class="btn btn-primary btn-block btn-lg" id="submit-btn">
        Update Password
      </button>
    </form>

    <div style="text-align:center;margin-top:20px">
      <a href="enforcement.html" style="font-size:.85rem;color:var(--muted)">← Back to Enforcement</a>
    </div>
  </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/supabase-config.js"></script>
<script src="js/app.js"></script>
<script>
  const form      = document.getElementById('cp-form');
  const errEl     = document.getElementById('form-error');
  const successEl = document.getElementById('form-success');
  const submitBtn = document.getElementById('submit-btn');

  // ── Auth init ───────────────────────────────────────────────────────────────
  let _cpUser = null;
  (async () => {
    const user = await requireAuth('change-password.html');
    if (!user) return;
    _cpUser = user;
    document.getElementById('user-badge').textContent = user.name;
  })();

  document.getElementById('logout-btn').addEventListener('click', () => {
    logoutUser().then(() => { window.location.href = 'login.html'; });
  });

  form.addEventListener('submit', async e => {
    e.preventDefault();
    errEl.classList.add('hidden');
    successEl.classList.add('hidden');

    const current  = document.getElementById('current_password').value;
    const newPw    = document.getElementById('new_password').value;
    const confirm  = document.getElementById('confirm_password').value;

    if (!current || !newPw || !confirm) {
      errEl.textContent = 'Please fill in all fields.';
      errEl.classList.remove('hidden');
      return;
    }
    if (newPw !== confirm) {
      errEl.textContent = 'New passwords do not match.';
      errEl.classList.remove('hidden');
      return;
    }
    if (newPw.length < 6) {
      errEl.textContent = 'New password must be at least 6 characters.';
      errEl.classList.remove('hidden');
      return;
    }

    submitBtn.textContent = 'Updating…';
    submitBtn.disabled = true;

    try {
      const result = await changePassword(_cpUser ? _cpUser.id : null, current, newPw);
      if (result.success) {
        form.reset();
        successEl.textContent = 'Password updated successfully.';
        successEl.classList.remove('hidden');
      } else {
        errEl.textContent = result.error;
        errEl.classList.remove('hidden');
      }
    } catch (err) {
      errEl.textContent = 'Something went wrong. Please try again.';
      errEl.classList.remove('hidden');
    } finally {
      submitBtn.textContent = 'Update Password';
      submitBtn.disabled = false;
    }
  });
</script>
</body>
</html>
