<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Staff Login — Visitors Parking</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

<div class="login-page">
  <div class="login-card">
    <div class="login-logo">
      <span class="logo-icon-large">🅿️</span>
      <h1>Visitors Parking</h1>
      <p>Staff Portal — Please sign in</p>
    </div>

    <div class="alert alert-error hidden" id="login-error"></div>

    <form id="login-form" novalidate>
      <div class="form-group">
        <label for="email">Email Address</label>
        <input id="email" type="email" class="form-control" placeholder="staff@condo.com" required autocomplete="email" />
      </div>
      <div class="form-group">
        <label for="password">Password</label>
        <input id="password" type="password" class="form-control" placeholder="••••••••" required autocomplete="current-password" />
      </div>
      <button type="submit" class="btn btn-primary btn-block btn-lg" id="submit-btn">Sign In</button>
    </form>

    <div style="text-align:center;margin-top:16px">
      <a href="index.html" style="font-size:.85rem;color:var(--muted)">← Back to Home</a>
    </div>
  </div>
</div>

<script src="js/app.js"></script>
<script>
  // If already logged in, go home
  if (getCurrentUser()) window.location.href = 'index.html';

  // Parse ?from= param for redirect after login
  const params   = new URLSearchParams(window.location.search);
  const redirect = params.get('from') || 'enforcement.html';

  const form    = document.getElementById('login-form');
  const errEl   = document.getElementById('login-error');
  const submitBtn = document.getElementById('submit-btn');

  form.addEventListener('submit', async e => {
    e.preventDefault();
    errEl.classList.add('hidden');
    submitBtn.textContent = 'Signing in…';
    submitBtn.disabled = true;

    const email    = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value;

    try {
      const result = await loginUser(email, password);
      if (result.success) {
        window.location.href = redirect;
      } else {
        errEl.textContent = result.error;
        errEl.classList.remove('hidden');
        document.getElementById('password').value = '';
        submitBtn.textContent = 'Sign In';
        submitBtn.disabled = false;
      }
    } catch (err) {
      errEl.textContent = 'Something went wrong. Please refresh and try again.';
      errEl.classList.remove('hidden');
      submitBtn.textContent = 'Sign In';
      submitBtn.disabled = false;
    }
  });
</script>
</body>
</html>
